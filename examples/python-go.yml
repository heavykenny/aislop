# .aislop/config.yml — Python + Go backend
# Tailored for backend services. Disables JS-specific tooling
# that won't apply.

version: 1

engines:
  format: true
  lint: true
  code-quality: true
  ai-slop: true
  architecture: false
  security: true

quality:
  maxFunctionLoc: 80
  maxFileLoc: 500
  maxNesting: 5
  maxParams: 6

security:
  audit: true
  auditTimeout: 30000

scoring:
  weights:
    format: 0.5
    lint: 1.0
    code-quality: 1.5
    ai-slop: 1.0
    architecture: 1.0
    security: 2.5
  thresholds:
    good: 75
    ok: 50

ci:
  failBelow: 60
  format: json
